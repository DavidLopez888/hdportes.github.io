<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HDport.es - Reproductor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: rgba(0,0,0,0.9);
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        .header h1 { color: #e50914; font-size: 1.8rem; margin: 0; }
        .iframe-container { flex: 1; position: relative; }
        iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>HDport.es</h1>
    </div>
    <div class="iframe-container">
        <iframe id="playerFrame" allow="autoplay; encrypted-media; fullscreen"></iframe>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let streamUrl = urlParams.get('url');
        if (streamUrl) {
            const iframe = document.getElementById('playerFrame');
            iframe.src = streamUrl;
            
            // 🔧 Forzar eliminación de sandbox cada vez que el iframe intente cargar
            iframe.onload = function() {
                if (iframe.hasAttribute('sandbox')) {
                    iframe.removeAttribute('sandbox');
                    console.log('[OK] Sandbox eliminado');
                }
                // También intentar eliminar cualquier atributo restrictivo
                iframe.setAttribute('allow', 'autoplay; encrypted-media; fullscreen');
            };
            
            // Si el sandbox aparece después (por alguna razón), lo eliminamos mediante observador
            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    if (mutation.attributeName === 'sandbox') {
                        iframe.removeAttribute('sandbox');
                    }
                });
            });
            observer.observe(iframe, { attributes: true });
        }
    </script>
</body>
</html>
