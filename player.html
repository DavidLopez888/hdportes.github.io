<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HDport.es - Reproductor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000000;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            background-color: rgba(0,0,0,0.9);
            padding: 12px 16px;
            text-align: center;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }
        .header h1 {
            color: #e50914;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin: 0;
        }
        .header p {
            color: #ccc;
            font-size: 0.8rem;
            margin-top: 4px;
        }
        .iframe-container {
            flex: 1;
            position: relative;
            background-color: #000;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background-color: #000;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>HDport.es</h1>
        <p>Streaming en vivo</p>
    </div>
    <div class="iframe-container">
        <iframe id="playerFrame" allow="autoplay; encrypted-media; fullscreen"></iframe>
    </div>
    <script>
        // 🔍 Leer el parámetro 'url' de la URL de la página
        const urlParams = new URLSearchParams(window.location.search);
        const streamUrl = urlParams.get('url');
        if (streamUrl) {
            document.getElementById('playerFrame').src = streamUrl;
        } else {
            document.getElementById('playerFrame').src = 'about:blank';
        }
    </script>
</body>
</html>
